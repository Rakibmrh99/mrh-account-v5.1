<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Trash Manager — Daily Account</title>
  <link rel="stylesheet" href="../css/base.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:linear-gradient(160deg,#0d0b1e 0%,#1a1040 50%,#0a1628 100%);
      font-family:var(--font-bangla,'Hind Siliguri',sans-serif);
      color:white;
    }
    .tm-header{
      background:linear-gradient(135deg,#dc2626,#b91c1c,#7f1d1d);
      padding:22px 18px 18px;
      display:flex;align-items:center;gap:12px;
      box-shadow:0 6px 28px rgba(239,68,68,.45);
      position:sticky;top:0;z-index:60;
    }
    .tm-header h1{font-size:1.25rem;font-weight:900;flex:1;letter-spacing:.3px}
    .tm-info{
      background:rgba(239,68,68,.12);border:1.5px solid rgba(239,68,68,.28);
      margin:14px;border-radius:18px;padding:15px 16px;
      display:flex;align-items:center;gap:12px;font-size:.88rem;color:#fca5a5;font-weight:700;
      line-height:1.5;
    }
    .tm-actions{
      display:flex;gap:10px;margin:0 14px 14px;
    }
    .tm-action-btn{
      flex:1;padding:15px;border:none;border-radius:14px;font-size:.92rem;
      font-weight:900;cursor:pointer;transition:all .2s;letter-spacing:.2px;
      -webkit-tap-highlight-color:transparent;
    }
    .tm-action-btn:active{transform:scale(.96);}
    .btn-restore-all{background:linear-gradient(135deg,rgba(16,185,129,.25),rgba(5,150,105,.15));color:#34d399;border:1.5px solid rgba(16,185,129,.4);}
    .btn-empty-all{background:linear-gradient(135deg,rgba(239,68,68,.25),rgba(220,38,38,.15));color:#f87171;border:1.5px solid rgba(239,68,68,.4);}
    .filter-row{
      display:flex;gap:8px;padding:0 14px 14px;overflow-x:auto;scrollbar-width:none;
    }
    .filter-row::-webkit-scrollbar{display:none}
    .filter-btn{
      flex-shrink:0;padding:10px 16px;border-radius:22px;font-size:.84rem;font-weight:800;
      border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.65);cursor:pointer;white-space:nowrap;transition:all .22s;
      -webkit-tap-highlight-color:transparent;
    }
    .filter-btn:active{transform:scale(.95);}
    .filter-btn.active{background:rgba(239,68,68,.3);color:#fca5a5;border-color:rgba(239,68,68,.5);}
    #trashList{padding:0 14px 100px;}
    .count-bar{
      display:flex;justify-content:space-between;align-items:center;
      padding:4px 14px 10px;
    }
    .count-bar span{color:rgba(255,255,255,.5);font-size:.84rem;font-weight:700}
    .count-bar strong{color:#f87171;font-size:1rem;}
    /* Trash items bigger */
    .trash-item{
      background:rgba(255,255,255,.05) !important;
      border:1px solid rgba(255,255,255,.1) !important;
      border-radius:18px !important;
      padding:16px !important;
      margin-bottom:12px !important;
    }
    .trash-item-title{font-size:1rem !important;font-weight:900 !important;}
    .trash-item-amt{font-size:1.15rem !important;font-weight:900 !important;}
    .trash-item-meta{font-size:.78rem !important;}
    .trash-btn{padding:10px 14px !important;border-radius:12px !important;font-size:.82rem !important;font-weight:800 !important;}
  </style>
</head>
<body data-page="trash">

<div class="tm-header">
  <h1>🗑️ Trash Manager</h1>
  <span id="trashCount" style="background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;font-size:.78rem;font-weight:900">0 টি</span>
</div>

<div class="tm-info">
  <span style="font-size:1.2rem">⏱️</span>
  মুছে ফেলা আইটেম ৩০ দিন ট্র্যাশে থাকে। এরপর স্বয়ংক্রিয়ভাবে মুছে যাবে।
</div>

<div class="tm-actions">
  <button class="tm-action-btn btn-restore-all" onclick="restoreAll()">↩ সব পুনরুদ্ধার</button>
  <button class="tm-action-btn btn-empty-all"   onclick="emptyAll()">🗑️ ট্র্যাশ খালি</button>
</div>

<div class="filter-row">
  <button class="filter-btn active" data-filter="all"     onclick="setFilter('all')">📋 সব</button>
  <button class="filter-btn"        data-filter="income"  onclick="setFilter('income')">💰 আয়</button>
  <button class="filter-btn"        data-filter="expense" onclick="setFilter('expense')">💸 ব্যয়</button>
  <button class="filter-btn"        data-filter="ledger"  onclick="setFilter('ledger')">📋 লেনদেন</button>
  <button class="filter-btn"        data-filter="savings" onclick="setFilter('savings')">🏦 সঞ্চয়</button>
</div>

<div class="count-bar">
  <span>মোট: <strong id="trashCount2">০</strong> আইটেম</span>
  <span style="font-size:.72rem">ট্র্যাশ · Premium</span>
</div>

<div id="trashList"></div>

<script src="../js/db.js"></script>
<script src="../js/app.js"></script>
<script src="../js/trash-manager.js"></script>
<script>
  // sync count
  const c2 = document.getElementById('trashCount2');
  const observer = new MutationObserver(() => {
    if (c2) c2.textContent = document.getElementById('trashCount')?.textContent || '০';
  });
  const tc = document.getElementById('trashCount');
  if (tc) observer.observe(tc, {childList:true, characterData:true, subtree:true});
</script>

<style>
.__fbr{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.__fbr:last-child{border:none}.__fbl{color:#cbd5e1;font-size:.74rem;font-weight:700}
.__fbc{width:32px;height:24px;border:none;border-radius:6px;cursor:pointer;padding:2px}
.__fbr2{width:85px;accent-color:#6b7280;cursor:pointer}.__fbv{color:#6b7280;font-size:.68rem;font-weight:700;min-width:26px;text-align:right}
</style>
<script>
(function(){
  var ball=document.getElementById('__fb'),ov=document.getElementById('__fbo'),dr=document.getElementById('__fbd');
  if(!ball)return;
  try{var s=JSON.parse(localStorage.getItem('settings')||'{}');if(s.floatBallOff){ball.style.display='none';return;}}catch(e){}
  var drag=false,sx=0,sy=0,bx=0,by=0,mv=false;
  function gp(){var r=ball.getBoundingClientRect();return{x:r.left,y:r.top};}
  function onS(ex,ey){drag=true;mv=false;var p=gp();bx=p.x;by=p.y;sx=ex;sy=ey;ball.style.transition='none';ball.style.cursor='grabbing';}
  function onM(ex,ey){if(!drag)return;var dx=ex-sx,dy=ey-sy;if(Math.abs(dx)>4||Math.abs(dy)>4)mv=true;var nx=Math.max(4,Math.min(window.innerWidth-56,bx+dx)),ny=Math.max(4,Math.min(window.innerHeight-56,by+dy));ball.style.left=nx+'px';ball.style.top=ny+'px';ball.style.right='auto';ball.style.bottom='auto';}
  function onE(){drag=false;ball.style.cursor='grab';ball.style.transition='box-shadow .2s';}
  ball.addEventListener('mousedown',function(e){onS(e.clientX,e.clientY);e.preventDefault();});
  ball.addEventListener('touchstart',function(e){onS(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('mousemove',function(e){onM(e.clientX,e.clientY);});
  document.addEventListener('touchmove',function(e){onM(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('mouseup',onE);document.addEventListener('touchend',onE);
  ball.addEventListener('click',function(){if(!mv)window.__fbOpen();});
  window.__fbOpen=function(){
    ov.style.display='block';dr.style.display='block';
    requestAnimationFrame(function(){requestAnimationFrame(function(){dr.style.transform='translateY(0)';});});
    __fbLoad();
  };
  window.__fbClose=function(){
    dr.style.transform='translateY(100%)';
    setTimeout(function(){ov.style.display='none';dr.style.display='none';},300);
  };
  ov.addEventListener('click',window.__fbClose);
  var _pg='trash-manager';
  function _gc(){try{return JSON.parse(localStorage.getItem('pageConfig')||'{}')[_pg]||{};}catch(e){return{};}}
  function _sc(o){try{var all=JSON.parse(localStorage.getItem('pageConfig')||'{}');all[_pg]=Object.assign({},all[_pg]||{},o);localStorage.setItem('pageConfig',JSON.stringify(all));}catch(e){}}
  window.__fbA=function(inp){
    var k=inp.dataset.k,v=inp.value;
    var vEl=dr.querySelector('#__fbv_'+k);if(vEl)vEl.textContent=isNaN(v)?v:v+'px';
    var o={};o[k]=isNaN(v)?v:Number(v);_sc(o);
    if(typeof applyPageConfig==='function'){try{applyPageConfig();}catch(e){}}
  };
  window.__fbSave=function(){
    var cfg={};dr.querySelectorAll('[data-k]').forEach(function(i){var v=i.value;cfg[i.dataset.k]=isNaN(v)?v:Number(v);});
    _sc(cfg);
    if(typeof applyPageConfig==='function'){try{applyPageConfig();}catch(e){}}
    if(typeof showToast==='function')showToast('✅ কাস্টমাইজেশন সেভ হয়েছে');
  };
  window.__fbReset=function(){
    _sc({});
    if(typeof applyPageConfig==='function'){try{applyPageConfig();}catch(e){}}
    if(typeof showToast==='function')showToast('↺ রিসেট হয়েছে');
  };
  window.__fbLoad=function(){
    var cfg=_gc();dr.querySelectorAll('[data-k]').forEach(function(i){
      var k=i.dataset.k;if(cfg[k]!==undefined){i.value=cfg[k];var vEl=dr.querySelector('#__fbv_'+k);if(vEl)vEl.textContent=i.value+(i.type==='range'?'px':'');}
    });
  };
})();
</script>
